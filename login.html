<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicSync Portal Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0f172a; }
        .login-box { background: white; padding: 40px; border-radius: 10px; width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-box h2 { color: #0f172a; margin-bottom: 5px; }
        .login-box p { color: #64748b; font-size: 0.85rem; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 5px; font-size: 1rem; }
        .btn-login { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-login:hover { background: #1d4ed8; }
        #error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>CivicSync CAMS</h2>
        <p>Authorized Personnel Only</p>
        
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        
        <button class="btn-login" onclick="attemptLogin()">Access System</button>
        <p id="error-msg">Invalid credentials.</p>
    </div>

    <script>
        async function attemptLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const response = await fetch('http://127.0.0.1:8000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                
                const data = await response.json();

                if (data.status === 'success') {
                    localStorage.setItem('cams_role', data.user.role);
                    // Static Isolation Routing
                    window.location.href = data.user.role === 'Admin' ? 'admin.html' : 'index.html';
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = "System offline. Check local server.";
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
